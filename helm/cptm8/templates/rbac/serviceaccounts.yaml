{{/*
Service Accounts for CPTM8
*/}}
{{- if .Values.rbac.create }}
---
{{/*
Vector ServiceAccount - for log collection
*/}}
{{- if .Values.rbac.serviceAccounts.vector.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccounts.vector.name }}
  namespace: {{ include "cptm8.namespace" . }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    app: vector
{{- end }}
---
{{/*
ECR Token Refresher ServiceAccount - for ECR authentication
*/}}
{{- if .Values.rbac.serviceAccounts.ecrTokenRefresher.create }}
{{- if .Values.cronjobs.ecrTokenRefresher.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccounts.ecrTokenRefresher.name }}
  namespace: {{ include "cptm8.namespace" . }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    app: ecr-token-refresher
{{- end }}
{{- end }}
---
{{/*
ACR Token Refresher ServiceAccount - for ACR authentication (Azure)
*/}}
{{- if .Values.rbac.serviceAccounts.acrTokenRefresher.create }}
{{- if .Values.cronjobs.acrTokenRefresher.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccounts.acrTokenRefresher.name }}
  namespace: {{ include "cptm8.namespace" . }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    app: acr-token-refresher
{{- end }}
{{- end }}
{{- end }}
