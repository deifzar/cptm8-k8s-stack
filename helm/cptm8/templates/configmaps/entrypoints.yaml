{{/*
=============================================================================
DOCKER ENTRYPOINT CONFIGMAPS
=============================================================================
Kubernetes-compatible entrypoint scripts that replace Docker Compose entrypoints.
These scripts verify environment variables and prepare the application environment.
*/}}
{{- $namespace := include "cptm8.namespace" . -}}

---
# =============================================================================
# BACKEND ENTRYPOINT (Go services)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: docker-entrypoint-backend
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: entrypoint
data:
  docker-entrypoint.sh: |
    #!/bin/sh
    set -e

    # Set umask to create files with secure permissions
    # umask 0027 results in:
    # - New files: 640 (rw-r-----) - owner read/write, group read
    # - New directories: 750 (rwxr-x---) - owner rwx, group r-x
    umask 0027

    echo "🔧 Starting '${SERVICEM8_NAME}' service on Kubernetes..."
    echo "✅ Kubernetes manages secrets via environment variables"

    # In Kubernetes, secrets are already injected as environment variables
    # No need to read from /run/secrets/* files.

    # Verify required environment variables
    echo "🔍 Verifying environment variables..."

    # Ensure log directory is writable
    if [ -d "/app/log" ]; then
        echo "🔧 Ensuring log directory permissions..."
        touch /app/log/test_write.tmp 2>/dev/null && rm -f /app/log/test_write.tmp && echo "✅ Log directory is writable" || echo "⚠️  WARNING: Log directory is not writable"
    fi

    # Check RabbitMQ credentials
    if [ -z "$RABBITMQ_USERNAME" ]; then
        echo "⚠️  WARNING: RABBITMQ_USERNAME environment variable not set"
        exit 1
    else
        echo "✅ RabbitMQ username available"
    fi

    if [ -z "$RABBITMQ_PASSWORD" ]; then
        echo "⚠️  WARNING: RABBITMQ_PASSWORD environment variable not set"
    else
        echo "✅ RabbitMQ password available"
    fi

    # Check PostgreSQL credentials
    if [ -z "$POSTGRESQL_PASSWORD" ]; then
        echo "⚠️  WARNING: POSTGRESQL_PASSWORD environment variable not set"
    else
        echo "✅ PostgreSQL password available"
    fi

    # Check optional SMTP credentials (warnings only)
    if [ -z "$SMTP_USERNAME" ]; then
        echo "⚠️  WARNING: SMTP_USERNAME environment variable not set"
    else
        echo "✅ SMTP username available"
    fi

    if [ -z "$SMTP_PASSWORD" ]; then
        echo "⚠️  WARNING: SMTP_PASSWORD environment variable not set"
    else
        echo "✅ SMTP password available"
    fi

    # Check optional AWS credentials (warnings only)
    if [ -z "$AWS_KEY" ]; then
        echo "⚠️  WARNING: AWS_KEY environment variable not set"
    else
        echo "✅ AWS key available"
    fi

    if [ -z "$AWS_SECRET" ]; then
        echo "⚠️  WARNING: AWS_SECRET environment variable not set"
    else
        echo "✅ AWS secret available"
    fi

    # Process configuration.yaml if template exists
    if [ -f "/app/configs/configuration_template.yaml" ]; then
        echo "🔧 Processing configuration.yaml with environment variables..."
        envsubst < /app/configs/configuration_template.yaml > /app/configs/configuration.yaml
        echo "✅ Configuration processed with environment variables"
    else
        echo "ℹ️  No configuration template found, skipping envsubst processing"
    fi

    echo "✅ Kubernetes entrypoint preparation complete"

    # Execute the main command passed as arguments
    exec "$@"

---
# =============================================================================
# DASHBOARD FRONTEND ENTRYPOINT (Next.js)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: docker-entrypoint-dashboardm8-frontend
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: entrypoint
data:
  docker-entrypoint.sh: |
    #!/bin/sh
    set -e

    echo "🔧 Starting dashboardm8 service on Kubernetes..."
    echo "✅ Kubernetes manages secrets via environment variables"

    # Verify required environment variables
    echo "🔍 Verifying environment variables..."

    # Remove any existing .env file
    if [ -f "/app/.env" ]; then
        rm -f /app/.env || echo "Warning: Could not remove existing .env file"
    fi

    # Check PostgreSQL credentials
    if [ -z "$PPG_DATABASE_URL" ]; then
        echo "⚠️  WARNING: PPG_DATABASE_URL environment variable not set"
    else
        echo "✅ PPG_DATABASE_URL credentials available"
    fi

    # Check MongoDB credentials
    if [ -z "$PMG_DATABASE_URL" ]; then
        echo "⚠️  WARNING: PMG_DATABASE_URL environment variable not set"
    else
        echo "✅ PMG_DATABASE_URL credentials available"
    fi

    # Check OAuth Google secrets
    if [ -z "$GOOGLE_CLIENT_ID" ]; then
        echo "⚠️  WARNING: GOOGLE_CLIENT_ID environment variable not set"
    else
        echo "✅ GOOGLE_CLIENT_ID available"
    fi
    if [ -z "$GOOGLE_CLIENT_SECRET" ]; then
        echo "⚠️  WARNING: GOOGLE_CLIENT_SECRET environment variable not set"
    else
        echo "✅ GOOGLE_CLIENT_SECRET available"
    fi

    # Check SMTP secrets
    if [ -z "$SMTP_USERNAME" ]; then
        echo "⚠️  WARNING: SMTP_USERNAME environment variable not set"
    else
        echo "✅ SMTP username available"
    fi
    if [ -z "$SMTP_PASSWORD" ]; then
        echo "⚠️  WARNING: SMTP_PASSWORD environment variable not set"
    else
        echo "✅ SMTP password available"
    fi

    # Check AWS credentials
    if [ -z "$AWS_KEY" ]; then
        echo "⚠️  WARNING: AWS_KEY environment variable not set"
    else
        echo "✅ AWS key available"
    fi
    if [ -z "$AWS_SECRET" ]; then
        echo "⚠️  WARNING: AWS_SECRET environment variable not set"
    else
        echo "✅ AWS secret available"
    fi

    # Generate Prisma clients at runtime
    echo "🔧 Generating Prisma clients..."
    echo "📍 PostgreSQL URL: ${PPG_DATABASE_URL%%:*}://****@${PPG_DATABASE_URL##*@}"

    npx prisma generate --schema ./prisma/prisma-postgresql/schema.prisma 2>&1 || { echo "⚠️  PostgreSQL client generation failed"; exit 1; }

    echo "🔧 Generating SQL client (TypedSQL) - requires database connection..."
    echo "🔌 Testing database connectivity first..."
    timeout 10 sh -c 'until nc -z $POSTGRESQL_HOSTNAME 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done' || { echo "⚠️  PostgreSQL not reachable"; exit 1; }
    echo "✅ PostgreSQL is reachable"

    timeout 60 npx prisma generate --sql --schema ./prisma/prisma-postgresql/schema.prisma 2>&1 || { echo "⚠️  SQL client generation failed or timed out"; exit 1; }

    echo "🔧 Generating MongoDB client..."
    npx prisma generate --schema ./prisma/prisma-mongodb/schema.prisma 2>&1 || { echo "⚠️  MongoDB client generation failed"; exit 1; }

    echo "✅ Prisma clients generated successfully!"
    echo "✅ Kubernetes entrypoint preparation complete"

    # Execute the main command passed as arguments
    exec "$@"

---
