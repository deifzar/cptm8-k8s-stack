---
# =============================================================================
# REPORTINGM8 - Report Generation Service
# =============================================================================
{{- if .Values.reporting.reportingm8.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: configuration-template-reportingm8
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    app: reportingm8
data:
  configuration_template.yaml: |
    APP_ENV: {{ $appEnv }}
    LOG_LEVEL: "{{ $logLevel }}"
    ORCHESTRATORM8:
      Services:
        reportingm8: "${REPORTINGM8_URL}"
      Exchanges:
        scheduler: "topic"
      reportingm8:
        Queue:
          - scheduler
          - qreportingm8
          - 1
        Routing-keys:
          - scheduler.qreportingm8.#
        Queue-arguments:
        Consumer:
          - "qreportingm8"
          - "creportingm8"
          - "false"
    REPORTINGM8:
      Template:
        emailsummary: "assets/tesserent/emailsummarytemplate/emailsummarytemplate.html"
        emailnotificationreport: "assets/tesserent/emailnotificationreporttemplate/emailnotificationreporttemplate.html"
        report: "assets/tesserent/reporttemplate/001_reporttemplate.html"
        clientorganisation: "${COMPANY_NAME}"
        dashboard: "${DASHBOARDM8_URL}"
      SMTP:
        server: "${SMTP_SERVER}"
        port: "${SMTP_PORT}"
        username: "${SMTP_USERNAME}"
        password: "${SMTP_PASSWORD}"
        emailsender: "${SMTP_EMAILSENDER}"
      Schedule:
        report: monthly
        email: weekly
      Timezone: "Australia/Sydney"
    Cloud:
      provider: ""
      AWS:
        region: "${AWS_BUCKET_REGION}"
        key: "${AWS_KEY}"
        secret: "${AWS_SECRET}"
        bucket: "${AWS_BUCKET_NAME}"
    Database:
      location: "${POSTGRESQL_HOSTNAME}"
      port: 5432
      schema: "public"
      database: "${POSTGRESQL_DB}"
      username: "${POSTGRESQL_USERNAME}"
      password: "${POSTGRESQL_PASSWORD}"
    RabbitMQ:
      location: "${RABBITMQ_HOSTNAME}"
      port: 5672
      username: "${RABBITMQ_USERNAME}"
      password: "${RABBITMQ_PASSWORD}"
      pool:
        retry_attempts: 10
        retry_delay: 5
{{- end }}