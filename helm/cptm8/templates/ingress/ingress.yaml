{{/*
=============================================================================
INGRESS CONFIGURATION
=============================================================================
Ingress resources for CPTM8 platform.

Supported controllers:
  - nginx: NGINX Ingress Controller (default)
  - alb: AWS Application Load Balancer (EKS)
  - azure-application-gateway: Azure Application Gateway (AKS)

Features:
  - SSL/TLS termination with cert-manager support
  - WebSocket support for Socket.io
  - Security headers
  - Rate limiting (NGINX only)
*/}}
{{- if .Values.ingress.enabled }}
{{- $namespace := include "cptm8.namespace" . -}}
{{- $environment := .Values.global.environment -}}
{{- $className := .Values.ingress.className | default "nginx" -}}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cptm8-ingress
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: ingress
  annotations:
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}

    {{/*
    ==========================================================================
    NGINX INGRESS CONTROLLER
    ==========================================================================
    */}}
    {{- if eq $className "nginx" }}
    kubernetes.io/ingress.class: nginx
    # SSL/TLS Configuration
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Backend protocol
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # WebSocket support for socketm8
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: "socketm8-service"
    {{- if .Values.ingress.rateLimit.enabled }}
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: {{ .Values.ingress.rateLimit.rps | default "100" | quote }}
    nginx.ingress.kubernetes.io/limit-connections: {{ .Values.ingress.rateLimit.connections | default "50" | quote }}
    {{- end }}
    {{- if .Values.ingress.certManager.enabled }}
    # cert-manager integration
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.clusterIssuer | default "letsencrypt-prod" | quote }}
    {{- end }}
    {{- end }}

    {{/*
    ==========================================================================
    AWS ALB INGRESS CONTROLLER
    ==========================================================================
    */}}
    {{- if eq $className "alb" }}
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.alb.scheme | default "internet-facing" }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.alb.targetType | default "ip" }}
    {{- if .Values.ingress.alb.certificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.alb.certificateArn | quote }}
    {{- end }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.alb.healthcheckPath | default "/health" | quote }}
    # SSL redirect action
    alb.ingress.kubernetes.io/actions.ssl-redirect: |
      {"Type": "redirect", "RedirectConfig": {"Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}
    {{- if .Values.ingress.alb.securityGroups }}
    alb.ingress.kubernetes.io/security-groups: {{ .Values.ingress.alb.securityGroups | quote }}
    {{- end }}
    {{- if .Values.ingress.alb.wafAclArn }}
    alb.ingress.kubernetes.io/waf-acl-id: {{ .Values.ingress.alb.wafAclArn | quote }}
    {{- end }}
    {{- end }}

    {{/*
    ==========================================================================
    AZURE APPLICATION GATEWAY (AGIC)
    ==========================================================================
    */}}
    {{- if eq $className "azure-application-gateway" }}
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
    appgw.ingress.kubernetes.io/request-timeout: "300"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    {{- if .Values.ingress.agic.wafPolicyId }}
    appgw.ingress.kubernetes.io/waf-policy-for-path: {{ .Values.ingress.agic.wafPolicyId | quote }}
    {{- end }}
    {{- if .Values.ingress.agic.cookieBasedAffinity }}
    appgw.ingress.kubernetes.io/cookie-based-affinity: "true"
    {{- end }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}

  {{- if or .Values.ingress.tls (and (ne $className "alb") (ne $className "azure-application-gateway") .Values.ingress.hosts) }}
  tls:
  {{- if .Values.ingress.tls }}
  {{- toYaml .Values.ingress.tls | nindent 2 }}
  {{- else }}
  - hosts:
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
    secretName: cptm8-tls-secret
  {{- end }}
  {{- end }}

  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .host | quote }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path | default "/" }}
        pathType: {{ .pathType | default "Prefix" }}
        backend:
          service:
            name: {{ .serviceName }}
            port:
              number: {{ .servicePort }}
      {{- end }}
  {{- end }}
{{- end }}

{{/*
=============================================================================
CERT-MANAGER CLUSTER ISSUERS
=============================================================================
Only created when cert-manager is enabled and not using ALB (which handles certs)
*/}}
{{- if and .Values.ingress.enabled .Values.ingress.certManager.enabled (ne .Values.ingress.className "alb") }}
{{- if .Values.ingress.certManager.createClusterIssuers }}
---
# Let's Encrypt Production Issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.ingress.certManager.email | required "ingress.certManager.email is required" }}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className | default "nginx" }}
---
# Let's Encrypt Staging Issuer (for testing)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.ingress.certManager.email }}
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className | default "nginx" }}
{{- end }}
{{- end }}
