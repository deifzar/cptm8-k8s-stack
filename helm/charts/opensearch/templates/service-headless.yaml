{{- if .Values.enabled }}
{{- $namespace := include "opensearch.namespace" . }}
{{- $environment := include "opensearch.environment" . }}
---
# Headless service for cluster discovery
{{- if .Values.headless.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.clusterName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "opensearch.labels" . | nindent 4 }}
    app: opensearch-cluster
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.transportPort }}
      targetPort: transport
      protocol: TCP
      name: transport
    - port: {{ .Values.service.perfPort }}
      targetPort: perf
      protocol: TCP
      name: perf
  selector:
    environment: {{ $environment }}
    opensearch-role: master
{{- end }}
{{- end }}