{{- if .Values.enabled }}
{{- if .Values.initJob.enabled }}
{{- if .Values.replicaSet.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init
  namespace: {{ include "mongodb.namespace" . }}
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
    app: mongodb-init
    component: chat
spec:
  ttlSecondsAfterFinished: {{ .Values.initJob.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.initJob.backoffLimit }}
  template:
    metadata:
      labels:
        app: mongodb-init
        environment: {{ include "mongodb.environment" . }}
        tier: data
        component: chat
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongodb-init
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        env:
        - name: MONGO_INITDB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.env.configMapName }}
              key: MONGO_INITDB_DATABASE
        - name: MONGO_INITDB_COLLECTION
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.env.configMapName }}
              key: MONGO_INITDB_COLLECTION
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.env.configMapName }}
              key: MONGO_INITDB_ROOT_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.secretName }}
              key: mongodb-root-password
        - name: MONGO_NON_ROOT_USERNAME
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.env.configMapName }}
              key: MONGO_NON_ROOT_USERNAME
        - name: MONGO_NON_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.env.secretName }}
              key: mongodb-user-password
        - name: MONGO_HOST
          value: {{ include "mongodb.serviceHostname" . | quote }}
        - name: REPLICA_SET_NAME
          value: {{ .Values.replicaSet.name | quote }}
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo '========================================='
          echo 'MongoDB Replica Set Initialization'
          echo '========================================='
{{ include "mongodb.echoHosts" . | indent 10 }}
          echo "Replica Set: ${REPLICA_SET_NAME}"
          echo "Database: ${MONGO_INITDB_DATABASE}"
          echo '========================================='

          echo ''
          echo 'Step 1: Waiting for MongoDB to be ready...'
{{ include "mongodb.waitForReplicas" . | indent 10 }}
          echo '✅ All MongoDBs are reachable'

          echo ''
          echo '🔧 Step 2: Initializing replica set...'
          mongosh --host ${MONGO_HOST} --eval '
            const host = process.env.MONGO_HOST;
            try {
              rs.status();
            } catch (e) {
              rs.initiate({
                _id: process.env.REPLICA_SET_NAME,
                members: [
{{ include "mongodb.replicaSetMembers" . | indent 18 }}
                ]
              })
            }
          '

          echo ''
          echo '⏳ Step 3: Waiting for replica set to elect primary...'
          timeout=60
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            echo "Checking if primary is available... ($elapsed/$timeout seconds)"
            if mongosh --host ${MONGO_HOST} --eval 'rs.isMaster().ismaster' --quiet 2>/dev/null | grep -q true; then
              echo '✅ Primary node is ready!'
              break
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done

          if [ $elapsed -ge $timeout ]; then
            echo '❌ Timeout waiting for primary election'
            exit 1
          fi

          echo ''
          echo '📊 Step 4: Checking replica set status...'
          mongosh --host ${MONGO_HOST} --eval 'rs.status()' --quiet

          echo ''
          echo '👤 Step 5: Creating admin/root user and application database/user...'
          echo '   (Creating both in same connection using localhost exception)'
          mongosh --host ${MONGO_HOST} --eval "
            // Create root user in admin database
            db = db.getSiblingDB('admin');
            try {
              db.createUser({
                user: '${MONGO_INITDB_ROOT_USERNAME}',
                pwd: '${MONGO_INITDB_ROOT_PASSWORD}',
                mechanisms: ['SCRAM-SHA-256'],
                roles: [
                  {role: 'root', db: 'admin'}
                ]
              });
              print('✅ Root user ${MONGO_INITDB_ROOT_USERNAME} created');
            } catch (e) {
              if (e.code === 51003) {
                print('ℹ️  Root user ${MONGO_INITDB_ROOT_USERNAME} already exists');
              } else {
                throw e;
              }
            }

            // Create application database and user
            db = db.getSiblingDB('${MONGO_INITDB_DATABASE}');

            // Create collection if it doesn't exist
            if (!db.getCollectionNames().includes('${MONGO_INITDB_COLLECTION}')) {
              db.createCollection('${MONGO_INITDB_COLLECTION}');
              print('✅ Collection ${MONGO_INITDB_COLLECTION} created');
            } else {
              print('ℹ️  Collection ${MONGO_INITDB_COLLECTION} already exists');
            }

            // Create application user if doesn't exist
            try {
              db.createUser({
                user: '${MONGO_NON_ROOT_USERNAME}',
                pwd: '${MONGO_NON_ROOT_PASSWORD}',
                mechanisms: ['SCRAM-SHA-256'],
                roles: [{role: 'dbOwner', db: '${MONGO_INITDB_DATABASE}'}]
              });
              print('✅ User ${MONGO_NON_ROOT_USERNAME} created with dbOwner role');
            } catch (e) {
              if (e.code === 51003) {
                print('ℹ️  User ${MONGO_NON_ROOT_USERNAME} already exists');
              } else {
                throw e;
              }
            }
          "

          echo ''
          echo '========================================='
          echo 'MongoDB initialization complete!'
          echo '========================================='
          echo ''
          echo 'Replica Set Status:'
          mongosh --host ${MONGO_HOST} --username ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'rs.status().members.forEach(function(member) { print("  - " + member.name + ": " + member.stateStr); })'
          echo ''
          echo 'Database Info:'
          mongosh --host ${MONGO_HOST} --username ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval "
            use ${MONGO_INITDB_DATABASE};
            print('  - Database: ${MONGO_INITDB_DATABASE}');
            print('  - Collections: ' + db.getCollectionNames());
            print('  - Users: ' + db.getUsers().map(u => u.user));
          "

          echo ''
          echo '⚠️  IMPORTANT: MongoDB is currently running WITHOUT authentication enabled!'
          echo '   To enable authentication, you need to:'
          echo '   1. Update mongodb-dev.yaml to add --auth flag'
          echo '   2. Restart MongoDB pods'
          echo '   For development, you may leave auth disabled for simplicity.'
{{- end }}
{{- end }}
{{- end }}
