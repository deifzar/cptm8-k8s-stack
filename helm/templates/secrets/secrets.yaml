{{/*
=============================================================================
APPLICATION SECRETS
=============================================================================
9 Secret objects for the CPTM8 platform:
  1. postgresql-secrets     - Database credentials
  2. mongodb-secrets        - MongoDB credentials
  3. opensearch-secrets     - OpenSearch admin password
  4. rabbitmq-secrets       - Message queue credentials
  5. application-secrets    - NextAuth/AuthJS secret
  6. smtp-secrets           - Email service credentials
  7. aws-s3-credentials     - S3 bucket access for reports
  8. google-secrets         - OAuth credentials
  9. aws-ecr-credentials    - ECR registry access

IMPORTANT: In production, use external secret management (SOPS, Vault, AWS Secrets Manager)
For development, secrets can be provided via values.yaml (not recommended for sensitive data)
*/}}
{{- $namespace := include "cptm8.namespace" . -}}
{{- $secrets := .Values.secrets.data -}}

---
# =============================================================================
# 1. POSTGRESQL SECRETS
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: database
type: Opaque
data:
  {{- if $secrets.postgresql.rootPassword }}
  postgresql-root-password: {{ $secrets.postgresql.rootPassword | b64enc | quote }}
  {{- else }}
  postgresql-root-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if $secrets.postgresql.userPassword }}
  postgresql-user-password: {{ $secrets.postgresql.userPassword | b64enc | quote }}
  {{- else }}
  postgresql-user-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if $secrets.postgresql.databaseUrl }}
  postgresql-database-url: {{ $secrets.postgresql.databaseUrl | b64enc | quote }}
  {{- else }}
  {{- $host := printf "postgresql-service.%s.svc.cluster.local" $namespace }}
  {{- $password := $secrets.postgresql.userPassword | default "changeme" }}
  {{- $url := printf "postgresql://%s:%s@%s:5432/%s" .Values.config.postgresql.nonRootUsername $password $host .Values.config.postgresql.database }}
  postgresql-database-url: {{ $url | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# 2. MONGODB SECRETS
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: database
type: Opaque
data:
  {{- if $secrets.mongodb.rootPassword }}
  mongodb-root-password: {{ $secrets.mongodb.rootPassword | b64enc | quote }}
  {{- else }}
  mongodb-root-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if $secrets.mongodb.userPassword }}
  mongodb-user-password: {{ $secrets.mongodb.userPassword | b64enc | quote }}
  {{- else }}
  mongodb-user-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if $secrets.mongodb.databaseUrl }}
  mongodb-database-url: {{ $secrets.mongodb.databaseUrl | b64enc | quote }}
  {{- else }}
  {{- $host := printf "mongodb-primary-service.%s.svc.cluster.local" $namespace }}
  {{- $password := $secrets.mongodb.userPassword | default "changeme" }}
  {{- $url := printf "mongodb://%s:%s@%s:27017/%s" .Values.config.mongodb.nonRootUsername $password $host .Values.config.mongodb.database }}
  mongodb-database-url: {{ $url | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# 3. OPENSEARCH SECRETS
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: opensearch-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: database
type: Opaque
data:
  {{- if $secrets.opensearch.adminPassword }}
  opensearch-admin-password: {{ $secrets.opensearch.adminPassword | b64enc | quote }}
  {{- else }}
  opensearch-admin-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# 4. RABBITMQ SECRETS
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: messaging
type: Opaque
data:
  {{- if $secrets.rabbitmq.username }}
  rabbitmq-username: {{ $secrets.rabbitmq.username | b64enc | quote }}
  {{- else }}
  rabbitmq-username: {{ "cptm8user" | b64enc | quote }}
  {{- end }}
  {{- if $secrets.rabbitmq.password }}
  rabbitmq-password: {{ $secrets.rabbitmq.password | b64enc | quote }}
  {{- else }}
  rabbitmq-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if $secrets.rabbitmq.url }}
  rabbitmq-url: {{ $secrets.rabbitmq.url | b64enc | quote }}
  {{- else }}
  {{- $host := printf "rabbitmq-service.%s.svc.cluster.local" $namespace }}
  {{- $username := $secrets.rabbitmq.username | default "cptm8user" }}
  {{- $password := $secrets.rabbitmq.password | default "changeme" }}
  {{- $url := printf "amqp://%s:%s@%s:5672/" $username $password $host }}
  rabbitmq-url: {{ $url | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# 5. APPLICATION SECRETS (NextAuth/AuthJS)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: application-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: application
type: Opaque
data:
  {{- if $secrets.application.authSecret }}
  auth-secret: {{ $secrets.application.authSecret | b64enc | quote }}
  {{- else }}
  # Auto-generate a secure random secret for NextAuth
  auth-secret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# 6. SMTP SECRETS
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: smtp-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: email
type: Opaque
data:
  {{- if $secrets.smtp.username }}
  smtp-username: {{ $secrets.smtp.username | b64enc | quote }}
  {{- else }}
  smtp-username: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if $secrets.smtp.password }}
  smtp-password: {{ $secrets.smtp.password | b64enc | quote }}
  {{- else }}
  smtp-password: {{ "" | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# 7. AWS S3 CREDENTIALS (for report storage)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aws-s3-credentials
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: storage
type: Opaque
data:
  {{- if $secrets.aws.s3AccessKey }}
  aws-key: {{ $secrets.aws.s3AccessKey | b64enc | quote }}
  {{- else }}
  aws-key: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if $secrets.aws.s3SecretKey }}
  aws-secret: {{ $secrets.aws.s3SecretKey | b64enc | quote }}
  {{- else }}
  aws-secret: {{ "" | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# 8. GOOGLE OAUTH SECRETS
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: google-secrets
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: authentication
type: Opaque
data:
  {{- if $secrets.google.clientId }}
  google-client-id: {{ $secrets.google.clientId | b64enc | quote }}
  {{- else }}
  google-client-id: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if $secrets.google.clientSecret }}
  google-client-secret: {{ $secrets.google.clientSecret | b64enc | quote }}
  {{- else }}
  google-client-secret: {{ "" | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# 9. AWS ECR CREDENTIALS (for private image registry)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aws-ecr-credentials
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: registry
type: Opaque
data:
  {{- if $secrets.aws.ecrAccessKeyId }}
  aws-access-key-id: {{ $secrets.aws.ecrAccessKeyId | b64enc | quote }}
  {{- else }}
  aws-access-key-id: {{ "" | b64enc | quote }}
  {{- end }}
  {{- if $secrets.aws.ecrSecretAccessKey }}
  aws-secret-access-key: {{ $secrets.aws.ecrSecretAccessKey | b64enc | quote }}
  {{- else }}
  aws-secret-access-key: {{ "" | b64enc | quote }}
  {{- end }}

---
# =============================================================================
# ECR REGISTRY SECRET (Docker config for imagePullSecrets)
# =============================================================================
# This secret is used by Kubernetes to pull images from private ECR registry.
# It's refreshed by the ecr-token-refresher CronJob.
{{- if .Values.global.imageRegistry }}
apiVersion: v1
kind: Secret
metadata:
  name: ecr-registry-secret
  namespace: {{ $namespace }}
  labels:
    {{- include "cptm8.labels" . | nindent 4 }}
    component: registry
type: kubernetes.io/dockerconfigjson
data:
  # This is a placeholder that gets updated by the ecr-token-refresher CronJob
  # Initial value is an empty docker config
  .dockerconfigjson: {{ printf `{"auths":{"%s":{"auth":""}}}` .Values.global.imageRegistry | b64enc | quote }}
{{- end }}