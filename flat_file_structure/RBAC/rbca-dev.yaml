apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: cptm8-dev
  name: cptm8-developer-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-team-dev
  namespace: cptm8-dev
subjects:
- kind: Group
  name: cptm8-developers      # All members of this group get permissions
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: cptm8-developer-role
  apiGroup: rbac.authorization.k8s.io
---
# Service Account for AWS ECR
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresher
  namespace: cptm8-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-token-refresher-role
  namespace: cptm8-dev
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-token-refresher-binding
  namespace: cptm8-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-token-refresher-role
subjects:
- kind: ServiceAccount
  name: ecr-token-refresher
  namespace: cptm8-dev
---
# Service Account for Vector
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector-sa
  namespace: cptm8-dev
---
# Role for Vector (if needed for log collection)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vector-logs-role
  namespace: cptm8-dev    # ← Only this namespace
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
# RoleBinding for Vector
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vector-logs-binding
  namespace: cptm8-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vector-logs-role
subjects:
- kind: ServiceAccount
  name: vector-sa
  namespace: cptm8-dev