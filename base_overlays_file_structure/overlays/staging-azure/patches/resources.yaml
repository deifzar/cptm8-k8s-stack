# StatefulSets with Azure Premium Storage
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresqlm8
spec:
  template:
    spec:
      containers:
      - name: postgresqlm8
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
  volumeClaimTemplates:
  - metadata:
      name: postgresql-vct
    spec:
      storageClassName: cptm8-staging-azure-premium
      resources:
        requests:
          storage: 100Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-primary
spec:
  template:
    spec:
      containers:
      - name: mongodb
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      storageClassName: cptm8-staging-azure-premium
      resources:
        requests:
          storage: 50Gi
  - metadata:
      name: mongodb-config
    spec:
      storageClassName: cptm8-staging-azure-standard
      resources:
        requests:
          storage: 2Gi
---
