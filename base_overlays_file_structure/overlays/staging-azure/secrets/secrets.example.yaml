# Azure Staging Secrets Example
# Copy this file to secrets.yaml and fill in actual values
# Then encrypt with SOPS: sops -e secrets.yaml > secrets.encrypted.yaml
#
# For Azure Key Vault integration, consider using External Secrets Operator
# See: docs/staging/azure-staging-guide.md for details

apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secrets
type: Opaque
data:
  postgresql-root-password: "b64pass"
  postgresql-user-password: "b64pass"
  postgresql-database-url: "b64connectionstring"
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secrets
type: Opaque
data:
  mongodb-root-password: "b64pass"
  mongodb-user-password: "b64user"
  mongodb-database-url: "b64connectionstring"
---
apiVersion: v1
kind: Secret
metadata:
  name: opensearch-secrets
type: Opaque
data:
  opensearch-admin-password: "b64pass"
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secrets
type: Opaque
data:
  rabbitmq-url: "b64connectionstring"
  rabbitmq-username: "b64user"
  rabbitmq-password: "b64pass"
---
apiVersion: v1
kind: Secret
metadata:
  name: application-secrets
type: Opaque
data:
  auth-secret: "b64pass"
---
apiVersion: v1
kind: Secret
metadata:
  name: smtp-secrets
type: Opaque
data:
  # For SendGrid or Azure Communication Services
  smtp-username: "b64user"
  smtp-password: "b64pass"
---
# Azure Blob Storage credentials (for reports)
apiVersion: v1
kind: Secret
metadata:
  name: azure-storage-credentials
type: Opaque
data:
  # Option 1: Storage Account Key
  azure-storage-account-name: "b64accountname"
  azure-storage-account-key: "b64key"
  # Option 2: SAS Token (more secure, time-limited)
  # azure-storage-sas-token: "b64token"
---
# If still using AWS S3 from Azure (cross-cloud)
apiVersion: v1
kind: Secret
metadata:
  name: aws-s3-credentials
type: Opaque
data:
  aws-key: "b64key"
  aws-secret: "b64secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: google-secrets
type: Opaque
data:
  google-client-id: "b64id"
  google-client-secret: "b64secret"
---
# Azure Container Registry credentials
# Note: If using AKS with managed identity, ACR pull is automatic
# This is only needed for manual authentication
apiVersion: v1
kind: Secret
metadata:
  name: azure-acr-credentials
type: kubernetes.io/dockerconfigjson
data:
  # Generate with: kubectl create secret docker-registry azure-acr-credentials \
  #   --docker-server=<acr-name>.azurecr.io \
  #   --docker-username=<service-principal-id> \
  #   --docker-password=<service-principal-password> \
  #   --dry-run=client -o yaml
  .dockerconfigjson: "b64dockerconfigjson"
