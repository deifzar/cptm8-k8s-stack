apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  labels:
    app: rabbitmq
spec:
  clusterIP: None  # Headless service
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
# Headless service for StatefulSet pod DNS (required for cluster discovery)
apiVersion: v1
kind: Service
metadata:
  name: opensearch-cluster
  labels:
    app: opensearch
spec:
  clusterIP: None  # Headless service
  selector:
    opensearch-role: master  # Selects all OpenSearch master nodes
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
    - name: perf
      port: 9600
      targetPort: 9600
---
# Regular ClusterIP service for external access to OpenSearch
apiVersion: v1
kind: Service
metadata:
  name: opensearch-service
  labels:
    app: opensearch
spec:
  selector:
    opensearch-role: master
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: perf
      port: 9600
      targetPort: 9600
  type: ClusterIP
---
