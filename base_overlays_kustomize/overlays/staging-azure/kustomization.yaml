apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Set namespace for Azure staging
namespace: cptm8-staging

# Reference base resources
resources:
  - RBAC/rbac.yaml
  - ../../base
  - storage/storageclass-azure-disk.yaml
  - jobs/mongodb-init-job.yaml
  - ingress/ingress-staging.yaml
  - security/network-policies.yaml
  - security/pod-security.yaml
  # Cloud-native logging: Vector DaemonSet replaces base Vector Deployment
  - logging/vector-daemonset.yaml

# ConfigMaps (Azure staging-specific)
configMapGenerator:
  - name: cptm8-config
    files:
      - configmaps/config.yaml
  - name: postgresql-init-scripts
    files:
      - configmaps/postgresql-init-scripts.yaml
  - name: opensearch-config
    files:
      - configmaps/opensearch-config.yaml
  - name: vector-config
    files:
      - configmaps/vector-config.yaml
  - name: configuration-template-orchestratorm8
    files:
      - configmaps/configuration-template-orchestratorm8.yaml
  - name: configuration-template-asmm8
    files:
      - configmaps/configuration-template-asmm8.yaml
  - name: configuration-template-naabum8
    files:
      - configmaps/configuration-template-naabum8.yaml
  - name: configuration-template-katanam8
    files:
      - configmaps/configuration-template-katanam8.yaml
  - name: configuration-template-num8
    files:
      - configmaps/configuration-template-num8.yaml
  - name: configuration-template-reportingm8
    files:
      - configmaps/configuration-template-reportingm8.yaml
  - name: docker-entrypoint-backend
    files:
      - configmaps/docker-entrypoint-backend.yaml
  - name: docker-entrypoint-dashboardm8
    files:
      - configmaps/docker-entrypoint-dashboardm8.yaml
  - name: docker-entrypoint-socketm8
    files:
      - configmaps/docker-entrypoint-socketm8.yaml

# Secrets (Azure staging-specific)
secretGenerator:
  - name: secrets
    files:
      - secrets/secrets.encrypted.yaml

# Add common labels for Azure staging
labels:
  - pairs:
      environment: staging
      project: cptm8
      cloud-provider: azure
    includeSelectors: true

# Add common annotations
commonAnnotations:
  deployed-by: kustomize
  documentation: "See docs/staging/azure-staging-guide.md for usage"
  cloud-provider: azure

# Higher replicas for staging (HA)
# Note: Vector is excluded - it runs as a DaemonSet in cloud environments
replicas:
  - name: dashboardm8
    count: 2
  - name: socketm8
    count: 2
  - name: asmm8
    count: 2
  - name: naabum8
    count: 2
  - name: katanam8
    count: 2
  - name: num8
    count: 2
  - name: orchestratorm8
    count: 2
  - name: reportingm8
    count: 1

# Image tags for Azure staging (Azure Container Registry)
# Update <your-acr-name> with your actual ACR name
images:
  - name: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/{namespace}/dashboardm8
    newName: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/cptm8-staging/dashboardm8
    newTag: "0.8"
  - name: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/{namespace}/socketm8
    newName: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/cptm8-staging/socketm8
    newTag: "0.8"
  - name: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/{namespace}/asmm8
    newName: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/cptm8-staging/asmm8
    newTag: "0.8"
  - name: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/{namespace}/naabum8
    newName: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/cptm8-staging/naabum8
    newTag: "0.8"
  - name: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/{namespace}/katanam8
    newName: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/cptm8-staging/katanam8
    newTag: "0.8"
  - name: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/{namespace}/num8
    newName: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/cptm8-staging/num8
    newTag: "0.8"
  - name: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/{namespace}/orchestratorm8
    newName: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/cptm8-staging/orchestratorm8
    newTag: "0.8"
  - name: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/{namespace}/reportingm8
    newName: 507745009364.dkr.ecr.eu-south-2.amazonaws.com/cptm8-staging/reportingm8
    newTag: "0.8"

# Strategic merge patches
patches:
  - path: patches/resources.yaml
  # Cloud-native logging: Delete base Vector Deployment (replaced by DaemonSet)
  - path: patches/delete-vector-deployment.yaml
  # Add log-streamer sidecars to scanner pods (streams file logs to stdout)
  - path: patches/log-streamer-sidecar.yaml
