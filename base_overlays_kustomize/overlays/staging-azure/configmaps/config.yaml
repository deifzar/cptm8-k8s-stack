# configmaps/app-config.yaml - Azure AKS Staging Environment
apiVersion: v1
kind: ConfigMap
metadata:
  name: cptm8-config
data:
  # Environment settings
  NODE_ENV: "staging"
  ENVIRONMENT: "staging"
  LOG_LEVEL: "info"

  # Azure Container Registry (ACR)
  # Update with your ACR name: <acr-name>.azurecr.io
  AZURE_ACR_NAME: "cptm8acr"
  AZURE_SUBSCRIPTION_ID: "your-subscription-id"
  AZURE_RESOURCE_GROUP: "cptm8-staging-rg"

  # POSTGRESQL
  POSTGRESQL_NON_ROOT_USERNAME: "cpt_dbuser"
  POSTGRESQL_DB: "cptm8"

  # MONGODB
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_NON_ROOT_USERNAME: "cpt_dbuser"
  MONGO_INITDB_DATABASE: "cptm8chat"
  MONGO_INITDB_COLLECTION: "support"

  # RABBITMQ settings
  RabbitMQ_EXCHANGE: "notification"

  # SMTP settings (Azure Communication Services or external SMTP)
  # Option 1: Use Azure Communication Services Email
  # Option 2: Use external SMTP (e.g., SendGrid, AWS SES)
  SMTP_SERVER: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_EMAILSENDER: "no-reply@cptm8.net"

  # FRONTEND settings
  DASHBOARDM8_PORT: "443"
  DASHBOARDM8_URL: "https://dashboard-staging.cptm8.net"
  SOCKETM8_PORT: "443"
  USER_EMAIL_DOMAIN: "clientcorp.net.au"
  CLOUD_PROVIDER: "Azure"

  # AuthJS/NextAuth URL - CRITICAL for OAuth callbacks
  AUTH_URL: "https://dashboard-staging.cptm8.net"
  NEXTAUTH_URL: "https://dashboard-staging.cptm8.net"

  NEXT_DASHBOARD_URL: "https://dashboard-staging.cptm8.net"
  CORS: "http://dashboard-staging.cptm8.net https://socket-staging.cptm8.net"

  # Report Configuration
  # Option 1: Azure Blob Storage (recommended for Azure)
  # Option 2: Continue using AWS S3 (cross-cloud)
  COMPANY_NAME: "ACME Corp."

  # Azure Blob Storage Configuration
  AZURE_STORAGE_ACCOUNT: "cptm8reports"
  AZURE_STORAGE_CONTAINER: "reports"
  # If using AWS S3 from Azure (cross-cloud):
  # AWS_BUCKET_REGION: "eu-north-1"
  # AWS_BUCKET_NAME: "report-cptm8"

  # Service hostnames (Kubernetes DNS)
  DASHBOARDM8_HOSTNAME: "dashboardm8-service.cptm8-staging.svc.cluster.local"
  SOCKETM8_HOSTNAME: "socketm8-service.cptm8-staging.svc.cluster.local"

  RABBITMQ_HOSTNAME: "rabbitmq-service.cptm8-staging.svc.cluster.local"
  POSTGRESQL_HOSTNAME: "postgresql-service.cptm8-staging.svc.cluster.local"
  MONGODB1_HOSTNAME: "mongodb-primary-service.cptm8-staging.svc.cluster.local"
  OPENSEARCH1_HOSTNAME: "opensearch-service.cptm8-staging.svc.cluster.local"
  OPENSEARCH2_HOSTNAME: "opensearch-node2-service.cptm8-staging.svc.cluster.local"
  OPENSEARCH_DASHBOARD_HOSTNAME: "opensearch-dashboard-service.cptm8-staging.svc.cluster.local"
  VECTOR_HOSTNAME: "vector-service.cptm8-staging.svc.cluster.local"

  ASMM8_HOSTNAME: "asmm8-service.cptm8-staging.svc.cluster.local"
  NAABUM8_HOSTNAME: "naabum8-service.cptm8-staging.svc.cluster.local"
  KATANAM8_HOSTNAME: "katanam8-service.cptm8-staging.svc.cluster.local"
  NUM8_HOSTNAME: "num8-service.cptm8-staging.svc.cluster.local"
  REPORTINGM8_HOSTNAME: "reportingm8-service.cptm8-staging.svc.cluster.local"

  # Staging API endpoints
  ASMM8_URL: "http://asmm8-service.cptm8-staging.svc.cluster.local:8000"
  NAABUM8_URL: "http://naabum8-service.cptm8-staging.svc.cluster.local:8001"
  KATANAM8_URL: "http://katanam8-service.cptm8-staging.svc.cluster.local:8002"
  NUM8_URL: "http://num8-service.cptm8-staging.svc.cluster.local:8003"
  REPORTINGM8_URL: "http://reportingm8-service.cptm8-staging.svc.cluster.local:8004"
