# Vector Configuration for AWS Staging Environment
# Uses kubernetes_logs source to collect from container stdout/stderr
# instead of file-based collection from shared PVCs.
#
# Architecture:
#   Service Pods (with log-streamer sidecar)
#        ↓
#   Log files → sidecar tails → stdout
#        ↓
#   Kubernetes captures stdout → /var/log/containers/
#        ↓
#   Vector DaemonSet reads container logs
#        ↓
#   OpenSearch
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
data:
  vector.yaml: |
    # Vector Configuration for CPTm8 AWS Staging Environment
    api:
      enabled: true
      address: "0.0.0.0:8686"
      playground: false  # Disable in production

    # Data directory for Vector's internal state
    data_dir: "/tmp/vector"

    # Sources - Kubernetes container logs
    sources:
      kubernetes_logs:
        type: kubernetes_logs
        # Auto-discover pods in the namespace
        self_node_name: "${VECTOR_SELF_NODE_NAME}"
        # Only collect logs from cptm8 pods
        extra_label_selector: "tier in (application, logging)"
        # Exclude Vector's own logs to prevent loops
        exclude_paths_glob_patterns:
          - "**/vector*/**"
        # Parse as JSON if possible
        auto_partial_merge: true

    # Transforms - Process and enrich log data
    transforms:
      # Filter to only cptm8 application logs
      filter_cptm8_logs:
        type: filter
        inputs:
          - kubernetes_logs
        condition:
          type: vrl
          source: |
            # Only process logs from cptm8 services and log-streamer sidecars
            app = .kubernetes.pod_labels.app ?? ""
            container = .kubernetes.container_name ?? ""
            # Include main app containers and log-streamer sidecars
            includes(["asmm8", "naabum8", "katanam8", "num8", "orchestratorm8", "reportingm8", "dashboardm8", "socketm8"], app) ||
            container == "log-streamer"

      # Parse and enrich logs
      parse_logs:
        type: remap
        inputs:
          - filter_cptm8_logs
        source: |
          # Extract service name from Kubernetes metadata
          .service = .kubernetes.pod_labels.app ?? "unknown"

          # Try to parse the message as JSON (for structured logs)
          parsed, err = parse_json(.message)
          if err == null {
            # Merge parsed JSON fields into root
            . = merge(., parsed)
          }

          # Add environment metadata
          .environment = "staging"
          .cloud_provider = "aws"
          .namespace = .kubernetes.pod_namespace ?? "cptm8-staging"
          .pod_name = .kubernetes.pod_name ?? "unknown"
          .container_name = .kubernetes.container_name ?? "unknown"
          .node_name = .kubernetes.pod_node_name ?? "unknown"

          # Normalize timestamp
          if !exists(.timestamp) {
            .timestamp = .kubernetes.timestamp ?? now()
          }

          # Add log level detection if not present
          if !exists(.level) {
            msg = string!(.message)
            if contains(msg, "ERROR") || contains(msg, "error") {
              .level = "error"
            } else if contains(msg, "WARN") || contains(msg, "warn") {
              .level = "warn"
            } else if contains(msg, "DEBUG") || contains(msg, "debug") {
              .level = "debug"
            } else {
              .level = "info"
            }
          }

          # Clean up kubernetes metadata (keep essential fields only)
          del(.kubernetes)
          del(.file)
          del(.source_type)

      # Route by service type for separate indexes
      route_by_service:
        type: route
        inputs:
          - parse_logs
        route:
          scanners: '.service == "asmm8" || .service == "naabum8" || .service == "katanam8" || .service == "num8"'
          orchestrator: '.service == "orchestratorm8"'
          reporting: '.service == "reportingm8"'
          frontend: '.service == "dashboardm8" || .service == "socketm8"'

    # Sinks - Output destinations
    sinks:
      # Main OpenSearch sink for all logs
      opensearch_all:
        type: elasticsearch
        inputs:
          - parse_logs
        endpoints:
          - "http://opensearch-service.cptm8-staging.svc.cluster.local:9200"
        mode: "bulk"
        bulk:
          index: "cptm8-logs-staging-%Y.%m.%d"
          action: "index"
        request:
          timeout_secs: 60
          retry_attempts: 5
          retry_max_duration_secs: 300
          retry_initial_backoff_secs: 1
        buffer:
          type: "disk"
          max_size: 268435488  # 256MB
          when_full: "block"
        healthcheck:
          enabled: true

      # Separate index for scanner service logs (high volume)
      opensearch_scanners:
        type: elasticsearch
        inputs:
          - route_by_service.scanners
        endpoints:
          - "http://opensearch-service.cptm8-staging.svc.cluster.local:9200"
        mode: "bulk"
        bulk:
          index: "cptm8-scanners-staging-%Y.%m.%d"
          action: "index"
        request:
          timeout_secs: 60
          retry_attempts: 3
        buffer:
          type: "disk"
          max_size: 536870912  # 512MB for high-volume scanner logs
          when_full: "drop_newest"

      # CloudWatch Logs sink (AWS-specific)
      # Uncomment to enable CloudWatch logging
      # cloudwatch_logs:
      #   type: aws_cloudwatch_logs
      #   inputs:
      #     - parse_logs
      #   region: "eu-south-2"
      #   group_name: "/cptm8/staging/application"
      #   stream_name: "{{ service }}-{{ pod_name }}"
      #   create_missing_group: true
      #   create_missing_stream: true
      #   encoding:
      #     codec: json
