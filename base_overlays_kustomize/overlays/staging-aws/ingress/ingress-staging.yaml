# overlays/staging/ingress/ingress-staging.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cptm8-ingress
  annotations:
    # AWS ALB annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/xxx
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    
    # Security headers
    alb.ingress.kubernetes.io/actions.ssl-redirect: |
      {"Type": "redirect", "RedirectConfig": {"Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}
spec:
  rules:
  - host: dashboard-staging.cptm8.net
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dashboardm8-service
            port:
              number: 3000
  - host: socket-staging.cptm8.net
    http:
      paths:
      - path: /socket
        pathType: Prefix
        backend:
          service:
            name: socketm8-service
            port:
              number: 4000
  tls:
  - hosts:
    - dashboard-staging.cptm8.net
    - socket-staging.cptm8.net