# AWS EBS gp3 StorageClass for staging
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cptm8-staging-ebs-gp3
  labels:
    tier: data
allowVolumeExpansion: true
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  iops: "3000"
  throughput: "125"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer